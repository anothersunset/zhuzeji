spring:
  profiles:
    active: vulnerable
  datasource:
    url: jdbc:h2:mem:seclab
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    com.example.seclab: DEBUG
